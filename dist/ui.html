<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>/* WP Theme Builder Export — Plugin UI Styles */

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body, #app {
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 13px;
  color: var(--figma-color-text, #333);
  background: var(--figma-color-bg, #FFF);
}

button {
  font-family: inherit;
  font-size: inherit;
}

button:hover {
  filter: brightness(0.95);
}

button:active {
  filter: brightness(0.9);
}

input[type="checkbox"] {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: var(--figma-color-bg-brand, #0D99FF);
}

/* Scrollbar styling */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--figma-color-border, #DDD);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--figma-color-text-secondary, #999);
}
</style>
</head>
